<head>

<title>Shon 的部落格</title>

<style>

    color: white;

}

.post a {

    color: #333;
}

.footer {
    text-align: center;
    padding: 10px;
    color: gray;
}

    <div class="post">

    <div class="post">
        <h2><a href="#">YOLO 專題</a></h2>
        <p>使用 YOLO 進行物件偵測的專題介紹。</p>

</div>

<div class="footer">
    © 2026 Shon
</div>

</html>
